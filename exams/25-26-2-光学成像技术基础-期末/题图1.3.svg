<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
        </marker>
    </defs>

    <!-- 外围矩形框 (介质) -->
    <rect x="100" y="50" width="200" height="180" fill="none" stroke="black" stroke-width="2" />

    <!-- 中间的双凸形空腔 -->
    <path d="M 200 50 Q 170 140 200 230 Q 230 140 200 50 Z" fill="none" stroke="black" stroke-width="2" />

    <!-- 字母标签 A 和 B -->
    <text x="200" y="40" font-family="serif" font-size="20" font-weight="bold" text-anchor="middle">A</text>
    <text x="200" y="215" font-family="serif" font-size="20" font-weight="bold" text-anchor="middle">B</text>

    <!-- 左侧入射平行光线 -->
    <line x1="30" y1="100" x2="100" y2="100" stroke="black" stroke-width="2" marker-end="url(#arrow)" />
    <line x1="30" y1="160" x2="100" y2="160" stroke="black" stroke-width="2" marker-end="url(#arrow)" />

    <!-- 介质内部的阴影线 (表示材料) -->
    <!-- 左上角 -->
    <line x1="115" y1="90" x2="145" y2="65" stroke="black" stroke-width="2" />
    <line x1="115" y1="110" x2="155" y2="75" stroke="black" stroke-width="2" />
    <line x1="125" y1="120" x2="165" y2="85" stroke="black" stroke-width="2" />

    <!-- 左下角 -->
    <line x1="115" y1="190" x2="145" y2="165" stroke="black" stroke-width="2" />
    <line x1="115" y1="210" x2="155" y2="175" stroke="black" stroke-width="2" />
    <line x1="125" y1="220" x2="165" y2="185" stroke="black" stroke-width="2" />

    <!-- 右上角 -->
    <line x1="245" y1="90" x2="275" y2="65" stroke="black" stroke-width="2" />
    <line x1="245" y1="110" x2="285" y2="75" stroke="black" stroke-width="2" />
    <line x1="255" y1="120" x2="295" y2="85" stroke="black" stroke-width="2" />

    <!-- 右下角 -->
    <line x1="245" y1="190" x2="275" y2="165" stroke="black" stroke-width="2" />
    <line x1="245" y1="210" x2="285" y2="175" stroke="black" stroke-width="2" />
    <line x1="255" y1="220" x2="295" y2="185" stroke="black" stroke-width="2" />

</svg>