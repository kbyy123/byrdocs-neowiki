<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
        </marker>
    </defs>

    <!-- Main Optical Axis (Solid line) -->
    <line x1="50" y1="200" x2="550" y2="200" stroke="black" stroke-width="2" />
    
    <!-- Glass Sphere -->
    <circle cx="300" cy="200" r="100" fill="none" stroke="black" stroke-width="3" />
    
    <!-- Center C -->
    <circle cx="300" cy="200" r="4" fill="black" />
    <text x="300" y="230" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle">C</text>
    
    <!-- Reflective Coating (Right 1/3) - Perfect radial hatching -->
    <g stroke="black" stroke-width="2">
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(-72 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(-66 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(-60 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(-54 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(-48 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(-42 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(-36 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(-30 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(-24 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(-18 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(-12 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(-6 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(0 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(6 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(12 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(18 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(24 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(30 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(36 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(42 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(48 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(54 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(60 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(66 300 200)" />
        <line x1="400" y1="200" x2="412" y2="212" transform="rotate(72 300 200)" />
    </g>
    
    <!-- Incident Ray -->
    <path d="M 100 170 L 152.3 170 L 204.6 170" fill="none" stroke="black" stroke-width="2" marker-mid="url(#arrow)" />
    
    <!-- Label A -->
    <text x="80" y="176" font-family="serif" font-size="24" font-style="italic" text-anchor="middle">A</text>
</svg>