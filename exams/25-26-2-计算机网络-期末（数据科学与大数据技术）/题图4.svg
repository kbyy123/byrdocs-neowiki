<svg xmlns="http://www.w3.org/2000/svg" width="746" height="323" viewBox="0 0 746 323">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#222"/>
    </marker>
    <style>
      .line{stroke:#555;stroke-width:3;fill:none;stroke-linecap:round}
      .box{fill:#fff;stroke:#777;stroke-width:3}
      .dev{fill:#fff;stroke:#777;stroke-width:3}
      .port{fill:#ddd;stroke:#666;stroke-width:2}
      text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#222;font-size:31px}
      .small{font-size:28px}.label{font-size:31px}.num{font-size:30px;font-weight:bold}
      .arrow{stroke:#555;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <!-- left hosts -->
  <rect class="box" x="68" y="57" width="39" height="44"/><text x="79" y="90">A</text>
  <rect class="box" x="69" y="143" width="40" height="44"/><text x="80" y="176">B</text>
  <rect class="box" x="69" y="238" width="40" height="44"/><text x="80" y="271">C</text>

  <!-- B1 bridge -->
  <path class="dev" d="M202 124 L253 124 L282 162 L254 203 L203 203 L174 164 Z"/>
  <text x="209" y="177">B1</text>
  <rect class="port" x="194" y="119" width="12" height="14"/>
  <rect class="port" x="166" y="157" width="12" height="14"/>
  <rect class="port" x="194" y="196" width="12" height="14"/>
  <rect class="port" x="276" y="157" width="12" height="14"/>

  <line class="line" x1="107" y1="78" x2="194" y2="126"/>
  <line class="line" x1="109" y1="165" x2="166" y2="165"/>
  <line class="line" x1="109" y1="260" x2="194" y2="203"/>

  <text class="num" x="187" y="108">1</text>
  <text class="num" x="153" y="151">2</text>
  <text class="num" x="163" y="199">3</text>
  <text class="num" x="279" y="192">4</text>

  <!-- middle link and B2 -->
  <line class="line" x1="288" y1="164" x2="377" y2="164"/>
  <path class="dev" d="M407 124 L459 124 L488 162 L459 203 L407 203 L378 164 Z"/>
  <text x="416" y="177">B2</text>
  <rect class="port" x="456" y="119" width="12" height="14"/>
  <rect class="port" x="482" y="157" width="12" height="14"/>
  <rect class="port" x="456" y="196" width="12" height="14"/>
  <rect class="port" x="372" y="157" width="12" height="14"/>

  <text class="num" x="456" y="108">1</text>
  <text class="num" x="488" y="151">2</text>
  <text class="num" x="486" y="199">3</text>
  <text class="num" x="371" y="192">4</text>

  <!-- right hosts and hub -->
  <rect class="box" x="548" y="61" width="39" height="44"/><text x="558" y="94">D</text>
  <rect class="box" x="688" y="101" width="39" height="44"/><text x="699" y="134">E</text>
  <rect class="box" x="688" y="186" width="39" height="44"/><text x="700" y="219">F</text>
  <rect class="box" x="544" y="241" width="39" height="44"/><text x="555" y="274">G</text>
  <rect class="box" x="557" y="132" width="74" height="64"/><text x="575" y="174">H1</text>

  <line class="line" x1="468" y1="126" x2="548" y2="83"/>
  <line class="line" x1="494" y1="164" x2="557" y2="164"/>
  <line class="line" x1="468" y1="203" x2="544" y2="263"/>
  <rect class="port" x="552" y="158" width="11" height="13"/>
  <rect class="port" x="626" y="138" width="12" height="14"/>
  <rect class="port" x="626" y="179" width="12" height="14"/>
  <line class="line" x1="638" y1="145" x2="688" y2="123"/>
  <line class="line" x1="638" y1="186" x2="688" y2="208"/>

  <!-- labels -->
  <text class="label" x="284" y="80">Port</text>
  <path class="arrow" d="M309 91 L284 154"/>
  <text class="label" x="604" y="65">Hub</text>
  <path class="arrow" d="M630 73 L607 127"/>
  <text class="label" x="184" y="304">Bridge</text>
  <path class="arrow" d="M228 270 L228 214"/>
</svg>
